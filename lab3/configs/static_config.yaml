components_manager:
    task_processors: # Task processor is an executor for coroutine tasks
        main-task-processor: # Make a task processor for CPU-bound coroutine tasks.
            worker_threads: $worker-threads # Process tasks in 4 threads.

        fs-task-processor: # Make a separate task processor for filesystem bound tasks.
            worker_threads: $worker-fs-threads

    default_task_processor: main-task-processor

    components: # Configuring components that were registered via component_list
        server:
            listener: # configuring the main listening socket...
                port: $server-port # ...to listen on this port and...
                task_processor: main-task-processor # ...process incoming requests on this task processor.

        logging:
            fs-task-processor: fs-task-processor
            loggers:
                default:
                    file_path: "@stderr"
                    level: $logger-level
                    overflow_behavior: discard # Drop logs if the system is too busy to write them down.

        # Dynamic config options. Cache is disabled, updates are disabled.
        dynamic-config:
            # For most of userver dynamic configs, defaults are used, some are overridden here.
            # See userver "dynamic config" docs for what configs exist.
            defaults:
                HTTP_CLIENT_CONNECTION_POOL_SIZE: 1000

        congestion-control:

        http-client:
        http-client-core:
            load-enabled: $is_testing
            fs-task-processor: fs-task-processor

        dns-client:
            fs-task-processor: fs-task-processor

        # Требуется userver::components::Postgres (зависимость фреймворка). Не запускает pytest.
        testsuite-support: {}

        postgres-db:
            dbconnection: "postgresql://postgres:postgres@postgres:5432/conference_db"
            blocking_task_processor: fs-task-processor

        handler-ping:
            path: /ping
            method: GET
            task_processor: main-task-processor
            throttling_enabled: false
            url_trailing_slash: strict-match

        handler-user-get:
            path: /users
            method: GET
            auth:
                types:
                    - jwt-auth
            task_processor: main-task-processor

        handler-user-create:
            path: /users
            method: POST
            task_processor: main-task-processor

        handler-user-login:
            path: /users/login
            method: POST
            task_processor: main-task-processor
      
        handler-users-get:
            path: /users/{name_surname}
            method: GET
            auth:
                types:
                    - jwt-auth
            task_processor: main-task-processor

        handler-talk-create:
            path: /talks
            method: POST
            auth:
                types:
                    - jwt-auth
            task_processor: main-task-processor

        handler-talk-get-all:
            path: /talks
            method: GET
            auth:
                types:
                    - jwt-auth
            task_processor: main-task-processor

        handler-event-create:
            path: /events
            method: POST
            auth:
                types:
                    - jwt-auth
            task_processor: main-task-processor
        
        handler-event-add-talk:
            path: /events/{event_id}/talks/{talk_id}
            method: PUT
            auth:
                types:
                    - jwt-auth
            task_processor: main-task-processor
        
        handler-event-get-talks:
            path: /events/{event_id}/talks
            method: GET
            auth:
                types:
                    - jwt-auth
            task_processor: main-task-processor

        user-service-component:
            load-enabled: true

        talk-service-component:
            load-enabled: true

        event-service-component:
            load-enabled: true

        user-repository-component:
            load-enabled: true

        talk-repository-component:
            load-enabled: true
        
        event-repository-component:
            load-enabled: true

        ssl-hasher-component:
            load-enabled: true

        jwt-auth-component:
            load-enabled: true
            private_key: "private_key"
            issuer: "my-issuer"
            audience: "my-audience"