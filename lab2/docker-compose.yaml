version: "3.9"

services:
  lab2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lab2-service
    restart: unless-stopped
    environment:
      SECDIST_CONFIG: /etc/lab2/secdist.json
    networks:
      - network
    ports:
      - "8080:8080"

networks:
  network:
    driver: bridge
